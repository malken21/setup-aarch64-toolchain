name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPOSITRY_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ env.REGISTRY }}/${REPOSITRY_LC}:latest"
          
          # Build Docker image using Nix
          nix build .#default
          
          # Load the image into Docker daemon
          # Note: buildLayeredImage produces a tarball
          docker load < result
          
          # Tag and push
          # The image name in flake.nix is 'setup-aarch64-toolchain'
          docker tag setup-aarch64-toolchain:latest "$TAG"
          docker push "$TAG"
          
          # Push versioned tag if this was triggered by a tag
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION_TAG="${{ env.REGISTRY }}/${REPOSITRY_LC}:${{ github.ref_name }}"
            docker tag setup-aarch64-toolchain:latest "$VERSION_TAG"
            docker push "$VERSION_TAG"
            
            # Extract major and minor versions (e.g., v1, v1.1 from v1.1.0)
            VERSION=${{ github.ref_name }}
            # Remove 'v' prefix for processing
            V_NUM=${VERSION#v}
            MAJOR="v$(echo $V_NUM | cut -d. -f1)"
            MINOR="v$(echo $V_NUM | cut -d. -f1,2)"
            
            echo "Pushing additional tags: $MAJOR, $MINOR"
            for T in "$MAJOR" "$MINOR"; do
              docker tag setup-aarch64-toolchain:latest "${{ env.REGISTRY }}/${REPOSITRY_LC}:$T"
              docker push "${{ env.REGISTRY }}/${REPOSITRY_LC}:$T"
            done
          fi
