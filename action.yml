name: 'AArch64 Toolchain Setup'
description: 'Sets up AArch64 development tools (as, ld) on an AArch64 host runner using Docker shims'
author: 'malken21'
branding:
  icon: 'cpu'
  color: 'orange'
inputs:
  image:
    description: 'The Docker image to use for the toolchain'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Resolve Docker image name
      id: resolve-image
      shell: bash
      run: |
        IMAGE="${{ inputs.image }}"
        if [ -z "$IMAGE" ]; then
          # Determine the repository: prioritize github.action_repository.
          # Fallback to github.repository, but force official repo if running from its own path.
          REPO="${{ github.action_repository || github.repository }}"
          [[ "${{ github.action_path }}" == *"/malken21/setup-aarch64-toolchain"* ]] && REPO="malken21/setup-aarch64-toolchain"
          
          # Convert repository name to lowercase for Docker compatibility.
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          
          # Determine action version (ref). Default to 'latest' for main or local runs.
          TAG="${{ github.action_ref }}"
          [[ -z "$TAG" || "$TAG" == "main" ]] && TAG="latest"
          
          IMAGE="ghcr.io/${REPO_LC}:${TAG}"
        fi
        echo "image=$IMAGE" >> $GITHUB_OUTPUT

    - name: Generate tool shims
      shell: bash
      run: |
        SHIM_DIR="${{ github.workspace }}/.aarch64-toolchain-shims"
        bash "${{ github.action_path }}/scripts/setup-shims.sh" "${{ steps.resolve-image.outputs.image }}" "$SHIM_DIR"
        echo "Adding $SHIM_DIR to PATH"
        echo "$SHIM_DIR" >> $GITHUB_PATH
