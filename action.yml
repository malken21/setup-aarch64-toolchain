name: 'AArch64 Toolchain Setup'
description: 'Sets up AArch64 development tools (as, ld) on an AArch64 host runner using Docker shims'
author: 'malken21'
branding:
  icon: 'cpu'
  color: 'orange'
inputs:
  image:
    description: 'The Docker image to use for the toolchain'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Resolve Docker image name
      id: resolve-image
      shell: bash
      run: |
        if [ -z "${{ inputs.image }}" ]; then
          # github.action_repository refers to the repository where this action is defined.
          # When the action is referenced locally (uses: ./), it may be empty; fall back to github.repository.
          ACTION_REPO="${{ github.action_repository }}"
          if [ -z "$ACTION_REPO" ]; then
            ACTION_REPO="${{ github.repository }}"
          fi
          # Docker image names must be lowercase
          REPO_LC=$(echo "$ACTION_REPO" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}:latest" >> $GITHUB_OUTPUT
        else
          echo "image=${{ inputs.image }}" >> $GITHUB_OUTPUT
        fi

    - name: Generate tool shims
      shell: bash
      run: |
        SHIM_DIR="${{ github.workspace }}/.aarch64-toolchain-shims"
        bash "${{ github.action_path }}/scripts/setup-shims.sh" "${{ steps.resolve-image.outputs.image }}" "$SHIM_DIR"
        echo "Adding $SHIM_DIR to PATH"
        echo "$SHIM_DIR" >> $GITHUB_PATH
